# Flowplane Dev Mode — Local development without Zitadel
#
# Usage:
#   docker compose -f docker-compose-dev.yml up -d
#
# The CP boots a local mock OIDC issuer (dev-oidc feature) and writes a
# dev JWT to /var/flowplane/credentials via FLOWPLANE_CREDENTIALS_PATH.
# That path is bind-mounted to ~/.flowplane on the host so the flowplane
# CLI and other host-side clients can read the credential back.
# Use `flowplane init` to drive this automatically.

services:
  # PostgreSQL database
  flowplane-pg:
    image: postgres:17-alpine
    container_name: flowplane-pg
    environment:
      POSTGRES_USER: flowplane
      POSTGRES_PASSWORD: flowplane
      POSTGRES_DB: flowplane
    ports:
      - "5432:5432"
    volumes:
      - flowplane-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowplane"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - flowplane-network
    restart: unless-stopped

  # Flowplane Control Plane (dev mode)
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowplane:latest
    container_name: flowplane-control-plane
    environment:
      # Database
      FLOWPLANE_DATABASE_URL: postgresql://flowplane:flowplane@flowplane-pg:5432/flowplane
      FLOWPLANE_DATABASE_AUTO_MIGRATE: "true"
      # Auth — hardcoded dev mode (never from host env)
      FLOWPLANE_AUTH_MODE: dev
      # Credentials file — CP writes a JWT here for host-side clients (fp-4n5).
      # Points at the bind-mounted /var/flowplane directory below.
      FLOWPLANE_CREDENTIALS_PATH: /var/flowplane/credentials
      # Server
      FLOWPLANE_API_BIND_ADDRESS: 0.0.0.0
      FLOWPLANE_API_PORT: 8080
      FLOWPLANE_XDS_BIND_ADDRESS: 0.0.0.0
      FLOWPLANE_XDS_PORT: 18000
      FLOWPLANE_XDS_ADVERTISED_ADDRESS: control-plane
      FLOWPLANE_COOKIE_SECURE: "false"
      # Secret Encryption (replaced with generated key at init time)
      FLOWPLANE_SECRET_ENCRYPTION_KEY: __FLOWPLANE_DEV_ENCRYPTION_KEY__
      # Dev mTLS (fp-u54.6): same env vars prod uses, replaced at init time
      # with container-side paths under the /etc/flowplane/certs/ bind mount.
      FLOWPLANE_XDS_TLS_CERT_PATH: __FLOWPLANE_XDS_TLS_CERT_PATH__
      FLOWPLANE_XDS_TLS_KEY_PATH: __FLOWPLANE_XDS_TLS_KEY_PATH__
      FLOWPLANE_XDS_TLS_CLIENT_CA_PATH: __FLOWPLANE_XDS_TLS_CLIENT_CA_PATH__
      # Envoy admin (for stats dashboard — uses Docker network hostname)
      ENVOY_ADMIN_BASE_URL: "http://flowplane-envoy"
      # Logging
      RUST_LOG: info,flowplane=debug
    ports:
      - "8080:8080"
      - "18000:18000"
    volumes:
      # Dev mTLS material (fp-u54.6). Mirrors the Envoy mount so both services
      # see the same PKI at the same path. The CP reads
      # FLOWPLANE_XDS_TLS_{CERT,KEY,CLIENT_CA}_PATH env vars (set above) which
      # point inside this mount.
      - ${HOME}/.flowplane/certs/:/etc/flowplane/certs/:ro
      # Credentials bind mount (fp-4n5). CP writes a dev JWT to
      # /var/flowplane/credentials on boot; host-side clients (flowplane CLI)
      # read it back via the same bind-mounted path under ~/.flowplane.
      - ${HOME}/.flowplane/:/var/flowplane/:rw
    depends_on:
      flowplane-pg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - flowplane-network
    restart: unless-stopped

  # Envoy sidecar (optional — activate with --profile envoy)
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: flowplane-envoy
    profiles:
      - envoy
    entrypoint: ["/usr/local/bin/envoy"]
    command:
      - --config-path
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
    ports:
      - "10000:10000"
      - "10001-10020:10001-10020"
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - ${HOME}/.flowplane/envoy/:/etc/envoy/:ro
      - ${HOME}/.flowplane/certs/:/etc/flowplane/certs/:ro
    networks:
      - flowplane-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # httpbin test backend (optional — activate with --profile httpbin)
  httpbin:
    image: kennethreitz/httpbin:latest
    container_name: flowplane-httpbin
    profiles:
      - httpbin
    ports:
      - "8000:80"
    depends_on:
      control-plane:
        condition: service_healthy
    networks:
      - flowplane-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/get"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  flowplane-pgdata:
    driver: local

networks:
  flowplane-network:
    name: flowplane-network
