<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flowplane — {{ team }} — MCP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/{{ nonce }}/assets/dashboard.css">
  <script src="/{{ nonce }}/assets/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <h1>Flowplane</h1>
    <nav class="nav">
      <a href="/{{ nonce }}/">Overview</a>
      <a href="/{{ nonce }}/resources">Resources</a>
      <a href="/{{ nonce }}/apis">APIs</a>
      <a href="/{{ nonce }}/learning">Learning</a>
      <a href="/{{ nonce }}/ai">AI</a>
      <span class="active">MCP</span>
    </nav>
    <span class="team">team: {{ team }}</span>
  </header>
  <main id="resources">
    <div id="mcp-status"
         hx-get="/{{ nonce }}/partials/mcp/status"
         hx-trigger="load once"
         hx-target="#mcp-status"
         hx-swap="innerHTML">
      <p class="placeholder">Loading…</p>
    </div>
    <div id="mcp-tools"
         hx-get="/{{ nonce }}/partials/mcp/tools"
         hx-trigger="load once"
         hx-target="#mcp-tools"
         hx-swap="innerHTML">
      <p class="placeholder">Loading…</p>
    </div>
  </main>
</body>
</html>
