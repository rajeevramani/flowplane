<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flowplane — {{ team }} — APIs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/{{ nonce }}/assets/dashboard.css">
  <script src="/{{ nonce }}/assets/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <h1>Flowplane</h1>
    <nav class="nav">
      <a href="/{{ nonce }}/">Overview</a>
      <a href="/{{ nonce }}/resources">Resources</a>
      <span class="active">APIs</span>
      <a href="/{{ nonce }}/learning">Learning</a>
      <a href="/{{ nonce }}/ai">AI</a>
    </nav>
    <span class="team">team: {{ team }}</span>
  </header>
  <main id="resources">
    <details id="apis-list" open
             hx-get="/{{ nonce }}/partials/apis/list"
             hx-trigger="load once"
             hx-target="#apis-list-body"
             hx-swap="innerHTML">
      <summary>API definitions</summary>
      <div id="apis-list-body"><p class="placeholder">Loading…</p></div>
    </details>
  </main>
</body>
</html>
