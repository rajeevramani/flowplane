[advisories]
version = 2
yanked = "deny"
# Accepted for S12/#88 with explicit rationale:
# - RUSTSEC-2023-0071 (`rsa`): no patched release is available. Flowplane uses RSA through
#   JWT verification and dev/test token minting, not as a network-exposed private-key oracle.
#   Revisit when jsonwebtoken/rsa ships a safe upgrade or when dev OIDC is replaced.
# - RUSTSEC-2024-0436 (`paste`): build-time proc macro pulled by utoipa-axum; no runtime
#   exposure. Revisit when utoipa-axum drops/replaces it.
# - RUSTSEC-2025-0134 (`rustls-pemfile`): transitive via axum-server TLS; no safe upgrade in
#   the current axum-server line. Revisit when axum-server migrates to rustls-pki-types APIs.
ignore = [
  "RUSTSEC-2023-0071",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# Dependencies must be permissively licensed. First-party crates are private,
# unpublished, and license-pending until Q-006 is resolved.
private = { ignore = true }
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Zlib",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
