# Flowplane Control Plane + Zitadel Auth
#
# Usage:
#   docker-compose up -d
#   make up
#
# Access:
#   - API:      http://localhost:8080/api/v1/
#   - UI:       http://localhost:8080/
#   - Swagger:  http://localhost:8080/swagger-ui/
#   - xDS:      localhost:50051
#   - Zitadel:  http://localhost:8081 (admin: zitadel-admin@zitadel.localhost / Password1!)
#
# Zitadel:
#   On first run, Zitadel auto-creates an admin user and a machine service
#   account with a PAT written to ./zitadel/machinekey/admin-pat.txt.
#   Set ZITADEL_PROJECT_ID in your environment after creating a project.

services:
  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    container_name: flowplane-postgres
    environment:
      POSTGRES_USER: flowplane
      POSTGRES_PASSWORD: flowplane
      POSTGRES_DB: flowplane
    ports:
      - "5432:5432"
    volumes:
      - flowplane_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowplane"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - flowplane-network
    restart: unless-stopped

  # Zitadel PostgreSQL (separate from Flowplane's database)
  zitadel-db:
    image: postgres:17-alpine
    container_name: flowplane-zitadel-db
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel
      POSTGRES_DB: zitadel
    ports:
      - "5434:5432"
    volumes:
      - zitadel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - flowplane-network
    restart: unless-stopped

  # Zitadel identity provider
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: flowplane-zitadel
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-3nG1pz-cttTXaQapJLoDNSkiOQX4vPvK}
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8081
      ZITADEL_EXTERNALSECURE: "false"
      # Disable Login V2 (requires separate app) — use built-in Login V1
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      # Disable lockout for local dev (prevents "Too many authentication attempts" during E2E tests)
      ZITADEL_DEFAULTINSTANCE_LOCKOUTPOLICY_MAXPASSWORDATTEMPTS: "0"
      ZITADEL_DEFAULTINSTANCE_LOCKOUTPOLICY_MAXOTPATTEMPTS: "0"
      # Quotas: disable rate limiting on auth requests for local dev
      ZITADEL_QUOTAS_ACCESS_ENABLED: "false"
      # First instance admin user
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: zitadel-admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Password1!
      # Auto-create a machine user with PAT for service-to-service auth
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: 1
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/admin-pat.txt
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/admin-sa.json
    depends_on:
      zitadel-db:
        condition: service_healthy
    volumes:
      - ./zitadel/machinekey:/machinekey
    ports:
      - "8081:8080"
    networks:
      - flowplane-network
    restart: unless-stopped

  # Flowplane Control Plane
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowplane:latest
    container_name: flowplane-control-plane
    env_file:
      - path: .env.zitadel
        required: false
    environment:
      # Database configuration (PostgreSQL)
      FLOWPLANE_DATABASE_URL: postgresql://flowplane:flowplane@flowplane-postgres:5432/flowplane
      FLOWPLANE_DATABASE_AUTO_MIGRATE: "true"

      # Server configuration
      FLOWPLANE_API_BIND_ADDRESS: 0.0.0.0
      FLOWPLANE_API_PORT: 8080
      FLOWPLANE_XDS_BIND_ADDRESS: 0.0.0.0
      FLOWPLANE_XDS_PORT: 50051
      FLOWPLANE_XDS_ADVERTISED_ADDRESS: control-plane
      FLOWPLANE_COOKIE_SECURE: "false"

      # UI and MCP
      FLOWPLANE_UI_ORIGIN: "http://localhost:8080,http://localhost:6274"

      # Logging
      RUST_LOG: info,flowplane=debug

      # Observability
      FLOWPLANE_ENABLE_METRICS: "true"
      FLOWPLANE_ENABLE_TRACING: "false"

      # Secrets encryption (enables SDS) - auto-generated by setup-zitadel into .env.zitadel
      # To generate manually: openssl rand -base64 32

      # Vault integration — only set when running with a Vault service
      # (e.g., docker-compose-mtls-dev.yml). Without VAULT_ADDR, the Vault
      # backend is not registered and no Vault-related errors appear in logs.
      # VAULT_ADDR: "http://flowplane-vault:8200"
      # VAULT_TOKEN: "flowplane-dev-token"

      # Zitadel auth — issuer must match JWT "iss" claim (external URL)
      FLOWPLANE_ZITADEL_ISSUER: http://localhost:8081
      # JWKS fetched container-to-container (Zitadel listens on 8080 internally)
      FLOWPLANE_ZITADEL_JWKS_URL: http://zitadel:8080/oauth/v2/keys
      # PROJECT_ID, ADMIN_PAT, and SPA_CLIENT_ID are injected via .env.zitadel (written by setup-zitadel)
      # SPA auth config — served at /api/v1/auth/config for runtime OIDC initialization
      FLOWPLANE_APP_URL: http://localhost:8080

      # DCR proxy — Zitadel Management API (container-to-container)
      FLOWPLANE_ZITADEL_ADMIN_URL: http://zitadel:8080

      # Superadmin seeding (platform admin created on first startup)
      FLOWPLANE_SUPERADMIN_EMAIL: ${FLOWPLANE_SUPERADMIN_EMAIL:-admin@flowplane.local}
      FLOWPLANE_SUPERADMIN_INITIAL_PASSWORD: ${FLOWPLANE_SUPERADMIN_INITIAL_PASSWORD:-Flowplane1!}
    ports:
      - "8080:8080"   # HTTP API + UI
      - "50051:50051" # xDS gRPC (ADS + ALS + ExtProc all on this port)
    depends_on:
      postgres:
        condition: service_healthy
      zitadel:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - flowplane-network
    restart: unless-stopped

volumes:
  flowplane_pgdata:
    driver: local
  zitadel_pgdata:
    driver: local

networks:
  flowplane-network:
    name: flowplane-network
